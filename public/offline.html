<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARKO — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      background: #111827; 
      color: white; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    p { color: #9CA3AF; margin-bottom: 2rem; }
    button { 
      background: #7C3AED; 
      color: white; 
      border: none; 
      padding: 12px 32px; 
      border-radius: 12px; 
      font-size: 1rem; 
      cursor: pointer; 
    }
    button:hover { background: #6D28D9; }
  </style>
</head>
<body>
  <div>
    <div style="font-size: 4rem; margin-bottom: 1rem;">📡</div>
    <h1>Sem conexão</h1>
    <p>ARKO precisa de internet para funcionar. Verifique sua conexão e tente novamente.</p>
    <button onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
